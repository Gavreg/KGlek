name: Build
on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - 'main'
permissions:
  contents: write
jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
    - name: Installing workflow dependencies
      run:  sudo apt update && sudo apt install -y parallel tree
    - name: Building TexLive image
      run: sudo docker build -t teximage .
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0
        persist-credentials: true
    - name: Restore LaTeX temp archive from cache
      id: latex-cache
      uses: actions/cache/restore@v5
      with:
        path: cache.tar.gz
        key: ${{ runner.os }}-latex-temp-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-latex-temp-
    - name: Unpack LaTeX temp archive
      run: test -f cache.tar.gz && tar -xzvf cache.tar.gz  || echo "No cache archive"
    - name: Compiling pdf 
      run: sudo bash build.sh
    - name: Collect logs on failure
      if: failure() 
      run: |
        mkdir -p error_logs
        find . -type f -name "*.log" -exec cp --parents {} error_logs/ \;      
        echo "Logs saved to: error_logs/"
    - name: Upload error logs as artifacts
      if: failure()  
      uses: actions/upload-artifact@v7
      with:
        name: error-logs-${{ github.run_id }}
        path: error_logs/*
        retention-days: 7  
    - name: Push PDF artifacts to orphan branch
      env:
        GIT_AUTHOR_NAME: github-actions[bot]
        GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
        GIT_COMMITTER_NAME: github-actions[bot]
        GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
      run: |
        if git ls-remote --exit-code --heads "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" pdfs >/dev/null 2>&1; then
          git clone --branch pdfs --single-branch "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" /tmp/pdf-output
        else
          git init /tmp/pdf-output
          cd /tmp/pdf-output
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git checkout --orphan pdfs
        fi
        cd /tmp/pdf-output
        git config user.name "${GIT_AUTHOR_NAME}"
        git config user.email "${GIT_AUTHOR_EMAIL}"
        find "${{ github.workspace }}" -maxdepth 1 -type f -name '*.pdf'  -exec cp -f {} . \;
        cp -f "${{ github.workspace }}"/README_pdf.md .
        mv README_pdf.md README.md
        git add *.pdf
        git add README.md
        git commit -m "Update PDF from ${{ github.sha }}" || true
        git push origin HEAD:pdfs || true
    - name: Preparing for cache
      if: always()
      run: |
        find . -type f \( -name  "*.aux" -o -name "*.fdb_latexmk" -o -name "*.xdv" -o -name "*.nav" -o -name "*.out" -o -name "*.toc" -o -name "*.pdf" \) ! -name '*.image.pdf' -print0 | tar -czvf cache.tar.gz --null -T -
        tree
    - name: Save LaTeX temp archive to cache
      if: always()
      uses: actions/cache/save@v5
      with: 
        path: cache.tar.gz
        key: ${{ runner.os }}-latex-temp-${{ github.run_id }}
